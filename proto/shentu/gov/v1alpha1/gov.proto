syntax = "proto3";
package shentu.gov.v1alpha1;

import "gogoproto/gogo.proto";
import "cosmos/gov/v1beta1/gov.proto";

option go_package = "github.com/shentufoundation/shentu/x/gov/types/v1alpha1";
option (gogoproto.goproto_stringer_all) = false;
option (gogoproto.stringer_all)         = false;
option (gogoproto.goproto_getters_all)  = false;

message CustomParams {
  cosmos.gov.v1beta1.TallyParams certifier_update_security_vote_tally = 1;

  // Field 2 (certifier_update_stake_vote_tally) is retired alongside
  // the two-round security-proposal model. See shentu.gov.v1.CustomParams.
  reserved 2;
  reserved "certifier_update_stake_vote_tally";
}